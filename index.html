<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos Compartidos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQbZ_r5nenKLKdMAtGNcpRmYF-_L35EZU",
      authDomain: "gastos-4e0c3.firebaseapp.com",
      projectId: "gastos-4e0c3",
      storageBucket: "gastos-4e0c3.firebasestorage.app",
      messagingSenderId: "866480127083",
      appId: "1:866480127083:web:3fa2cb51c779a908bd452e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.__firebase = {
      db,
      collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy
    };
    window.dispatchEvent(new Event("firebase-ready"));
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f8; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const USERS = [
      { name: "Checho", color: "#5C6BC0", emoji: "🦎" },
      { name: "Eve", color: "#E91E8C", emoji: "🌸" },
    ];
    const CATEGORIES = [
      { name: "Casa", icon: "🏠" },
      { name: "Auto", icon: "🚗" },
      { name: "Salidas", icon: "🎉" },
      { name: "Delivery", icon: "🛵" },
      { name: "Farmacia", icon: "💊" },
      { name: "Regalos", icon: "🎁" },
      { name: "Viaje", icon: "✈️" },
      { name: "Kira", icon: "🐾" },
    ];
    const MONTH_NAMES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    const fmt = (n) => "$" + Number(n).toLocaleString("es-AR");

    function getYears(expenses) {
      return Array.from(new Set(expenses.map(e => e.date.slice(0,4)))).sort();
    }
    function getMonthsOfYear(expenses, year) {
      return Array.from(new Set(expenses.filter(e=>e.date.startsWith(year)).map(e=>e.date.slice(5,7)))).sort();
    }
    function calcResult(tA, tB) {
      const diff = tA - (tA+tB)/2;
      if (Math.abs(diff) < 1) return { text:"¡Están al día!", color:"#4CAF50" };
      if (diff > 0) return { text:`${USERS[1].name} le debe a ${USERS[0].name} ${fmt(Math.abs(diff))}`, color:USERS[1].color };
      return { text:`${USERS[0].name} le debe a ${USERS[1].name} ${fmt(Math.abs(diff))}`, color:USERS[0].color };
    }

    function useFirebase() {
      const [ready, setReady] = useState(!!window.__firebase);
      useEffect(() => {
        if (window.__firebase) return;
        const h = () => setReady(true);
        window.addEventListener("firebase-ready", h);
        return () => window.removeEventListener("firebase-ready", h);
      }, []);
      return ready ? window.__firebase : null;
    }

    function GastosView({ expenses, onDelete }) {
      const [expanded, setExpanded] = useState({});
      const toggle = (key) => setExpanded(p => ({ ...p, [key]: !p[key] }));
      const years = getYears(expenses);

      if (!expenses.length) return (
        <div style={{ textAlign:"center", color:"#aaa", marginTop:60 }}>
          <div style={{ fontSize:48 }}>📋</div><p>No hay gastos todavía</p>
        </div>
      );

      return (
        <div style={{ padding:16, overflowX:"auto" }}>
          {years.map(year => {
            const yExp = expenses.filter(e => e.date.startsWith(year));
            const months = getMonthsOfYear(expenses, year);
            const activeCats = CATEGORIES.filter(c => yExp.some(e => e.category === c.name));
            return (
              <div key={year} style={{ marginBottom:32 }}>
                <table style={{ width:"100%", borderCollapse:"collapse", minWidth: 300 + months.length*90 }}>
                  <thead>
                    <tr>
                      <th style={{ background:"#3d4060", color:"#fff", padding:"8px 10px", textAlign:"left", borderRadius:"8px 0 0 0", width:"30%" }}>Categoría</th>
                      {months.map(m => (
                        <th key={m} style={{ background:"#5C6BC0", color:"#fff", padding:"8px 10px", textAlign:"right", whiteSpace:"nowrap", width:`${55/months.length}%` }}>
                          {MONTH_NAMES[parseInt(m)-1]}
                        </th>
                      ))}
                      <th style={{ background:"#2d2f45", color:"#fff", padding:"8px 10px", textAlign:"right", borderRadius:"0 8px 0 0", whiteSpace:"nowrap", width:"15%" }}>
                        Total '{year.slice(2)}
                      </th>
                    </tr>
                  </thead>
                  <tbody>
                    {activeCats.map(cat => {
                      const catExp = yExp.filter(e => e.category === cat.name);
                      const key = `${year}-${cat.name}`;
                      const isOpen = expanded[key];
                      return (
                        <React.Fragment key={cat.name}>
                          <tr style={{ background: isOpen ? "#f0f0ff" : "#fff", cursor:"pointer" }} onClick={() => toggle(key)}>
                            <td style={{ padding:"8px 10px", fontWeight:600, borderBottom:"1px solid #eee" }}>
                              <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
                                <span style={{ background: isOpen?"#5C6BC0":"#e0e0e0", color: isOpen?"#fff":"#666", borderRadius:4, width:16, height:16, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, flexShrink:0 }}>{isOpen?"−":"+"}</span>
                                <span style={{ fontSize:13 }}>{cat.icon} {cat.name}</span>
                              </span>
                            </td>
                            {months.map(m => {
                              const sum = catExp.filter(e=>e.date.slice(5,7)===m).reduce((a,e)=>a+e.amount,0);
                              return <td key={m} style={{ padding:"8px 10px", textAlign:"right", borderBottom:"1px solid #eee", color:"#333", fontSize:13 }}>{sum ? fmt(sum) : ""}</td>;
                            })}
                            <td style={{ padding:"8px 10px", textAlign:"right", fontWeight:700, borderBottom:"1px solid #eee", fontSize:13 }}>{fmt(catExp.reduce((a,e)=>a+e.amount,0))}</td>
                          </tr>
                          {isOpen && [...catExp].sort((a,b)=>a.date.localeCompare(b.date)).map(e => {
                            const u = USERS.find(u=>u.name===e.user);
                            return (
                              <tr key={e.id} style={{ background:"#f8f8ff" }}>
                                <td style={{ padding:"7px 10px 7px 34px", borderBottom:"1px solid #f0f0f0", fontSize:12 }}>
                                  <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
                                    <span style={{ width:7, height:7, borderRadius:"50%", background:u?.color, display:"inline-block", flexShrink:0 }}></span>
                                    {e.desc||"(sin desc)"} · {e.user} · {e.date.split("-").reverse().join("/")}
                                    <button onClick={(ev)=>{ev.stopPropagation();onDelete(e.id);}} style={{ background:"none", border:"none", cursor:"pointer", color:"#ccc", fontSize:13, padding:"0 2px" }}>🗑️</button>
                                  </span>
                                </td>
                                {months.map(m => (
                                  <td key={m} style={{ padding:"7px 10px", textAlign:"right", borderBottom:"1px solid #f0f0f0", fontSize:13, color:u?.color }}>
                                    {e.date.slice(5,7)===m ? fmt(e.amount) : ""}
                                  </td>
                                ))}
                                <td style={{ borderBottom:"1px solid #f0f0f0" }}></td>
                              </tr>
                            );
                          })}
                        </React.Fragment>
                      );
                    })}
                    <tr style={{ background:"#f0f2f8", fontWeight:700 }}>
                      <td style={{ padding:"8px 10px" }}>TOTAL</td>
                      {months.map(m => {
                        const sum = yExp.filter(e=>e.date.slice(5,7)===m).reduce((a,e)=>a+e.amount,0);
                        return <td key={m} style={{ padding:"8px 10px", textAlign:"right", color:"#5C6BC0", fontSize:13 }}>{fmt(sum)}</td>;
                      })}
                      <td style={{ padding:"8px 10px", textAlign:"right", fontSize:13 }}>{fmt(yExp.reduce((a,e)=>a+e.amount,0))}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      );
    }

    function AgregarView({ user, onAdd }) {
      const [form, setForm] = useState({ amount:"", category:"Casa", desc:"", date: new Date().toISOString().slice(0,10) });
      const [loading, setLoading] = useState(false);

      const handleAdd = async () => {
        if (!form.amount || isNaN(form.amount) || Number(form.amount) <= 0) return;
        setLoading(true);
        await onAdd({ user:user.name, amount:Number(form.amount), category:form.category, desc:form.desc, date:form.date });
        setForm(f => ({ ...f, amount:"", desc:"" }));
        setLoading(false);
      };

      return (
        <div style={{ padding:16, maxWidth:600, margin:"0 auto" }}>
          <div style={{ background:"#fff", borderRadius:16, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
            <h2 style={{ margin:"0 0 20px", fontSize:20, fontWeight:700 }}>Nuevo gasto</h2>
            <label style={{ display:"block", marginBottom:6, fontSize:13, color:"#666" }}>Monto ($)</label>
            <input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
              style={{ width:"100%", padding:14, fontSize:18, borderRadius:10, border:"2px solid #5C6BC0", boxSizing:"border-box", marginBottom:16, outline:"none" }} placeholder="0" />
            <label style={{ display:"block", marginBottom:6, fontSize:13, color:"#666" }}>Categoría</label>
            <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
              style={{ width:"100%", padding:12, fontSize:15, borderRadius:10, border:"1.5px solid #ddd", boxSizing:"border-box", marginBottom:16, background:"#fff" }}>
              {CATEGORIES.map(c=><option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
            </select>
            <label style={{ display:"block", marginBottom:6, fontSize:13, color:"#666" }}>Descripción (opcional)</label>
            <input type="text" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}
              style={{ width:"100%", padding:12, fontSize:15, borderRadius:10, border:"1.5px solid #ddd", boxSizing:"border-box", marginBottom:16 }} placeholder="Ej: supermercado" />
            <label style={{ display:"block", marginBottom:6, fontSize:13, color:"#666" }}>Fecha</label>
            <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
              style={{ width:"100%", padding:12, fontSize:15, borderRadius:10, border:"1.5px solid #ddd", boxSizing:"border-box", marginBottom:24 }} />
            <button onClick={handleAdd} disabled={loading} style={{ width:"100%", padding:16, background: loading?"#aaa":"#5C6BC0", color:"#fff", border:"none", borderRadius:12, fontSize:16, fontWeight:700, cursor: loading?"not-allowed":"pointer" }}>
              {loading ? "Guardando..." : "Agregar gasto"}
            </button>
          </div>
        </div>
      );
    }

    function BalanceView({ expenses }) {
      if (!expenses.length) return (
        <div style={{ textAlign:"center", color:"#aaa", marginTop:60 }}>
          <div style={{ fontSize:48 }}>⚖️</div><p>No hay gastos para calcular</p>
        </div>
      );
      const totA = expenses.filter(e=>e.user===USERS[0].name).reduce((a,e)=>a+e.amount,0);
      const totB = expenses.filter(e=>e.user===USERS[1].name).reduce((a,e)=>a+e.amount,0);
      const res = calcResult(totA, totB);
      return (
        <div style={{ padding:16, overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", minWidth:400 }}>
            <thead>
              <tr style={{ background:"#5C6BC0", color:"#fff" }}>
                <th style={{ padding:"10px 14px", textAlign:"left", borderRadius:"8px 0 0 0" }}></th>
                <th style={{ padding:"10px 12px", textAlign:"right" }}>{USERS[0].name}</th>
                <th style={{ padding:"10px 12px", textAlign:"right" }}>{USERS[1].name}</th>
                <th style={{ padding:"10px 12px", textAlign:"right" }}>Total</th>
                <th style={{ padding:"10px 14px", textAlign:"left", borderRadius:"0 8px 0 0" }}>Resultado</th>
              </tr>
            </thead>
            <tbody>
              <tr style={{ background:"#2d2f45", color:"#fff", fontWeight:700 }}>
                <td style={{ padding:"12px 14px", borderRadius:"0 0 0 8px" }}>💰 CONSOLIDADO</td>
                <td style={{ padding:"12px 12px", textAlign:"right", color:"#a5b4fc" }}>{fmt(totA)}</td>
                <td style={{ padding:"12px 12px", textAlign:"right", color:"#f9a8d4" }}>{fmt(totB)}</td>
                <td style={{ padding:"12px 12px", textAlign:"right" }}>{fmt(totA+totB)}</td>
                <td style={{ padding:"12px 14px", color:res.color, borderRadius:"0 0 8px 0", fontSize:13 }}>{res.text}</td>
              </tr>
            </tbody>
          </table>
        </div>
      );
    }

    function App() {
      const fb = useFirebase();
      const [user, setUser] = useState(null);
      const [tab, setTab] = useState("gastos");
      const [expenses, setExpenses] = useState([]);
      const [loadingData, setLoadingData] = useState(true);

      useEffect(() => {
        if (!fb) return;
        const { db, collection, onSnapshot, query, orderBy } = fb;
        const q = query(collection(db, "expenses"), orderBy("date", "asc"));
        const unsub = onSnapshot(q, snap => {
          setExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          setLoadingData(false);
        });
        return unsub;
      }, [fb]);

      const addExpense = async (e) => {
        const { db, collection, addDoc } = fb;
        await addDoc(collection(db, "expenses"), e);
        setTab("gastos");
      };

      const delExpense = async (id) => {
        const { db, doc, deleteDoc } = fb;
        await deleteDoc(doc(db, "expenses", id));
      };

      if (!fb || loadingData) return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#7C3AED,#EC4899)" }}>
          <div style={{ color:"#fff", fontSize:18, fontWeight:600 }}>Cargando... 💸</div>
        </div>
      );

      if (!user) return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#7C3AED,#EC4899)", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"#fff", borderRadius:24, padding:"40px 32px", width:320, textAlign:"center", boxShadow:"0 20px 60px rgba(0,0,0,0.2)" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>💸</div>
            <h1 style={{ margin:"0 0 4px", fontSize:24, fontWeight:700, color:"#1a1a2e" }}>Gastos Compartidos</h1>
            <p style={{ margin:"0 0 28px", color:"#888", fontSize:14 }}>¿Quién sos?</p>
            {USERS.map(u => (
              <button key={u.name} onClick={() => setUser(u)} style={{ display:"block", width:"100%", padding:14, marginBottom:12, borderRadius:50, border:"none", background:u.color, color:"#fff", fontSize:16, fontWeight:700, cursor:"pointer" }}>
                {u.name}
              </button>
            ))}
          </div>
        </div>
      );

      return (
        <div style={{ minHeight:"100vh", background:"#f0f2f8", fontFamily:"system-ui,sans-serif" }}>
          <div style={{ background:"#5C6BC0", color:"#fff", padding:"12px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ fontSize:11, opacity:0.7 }}>Sesión como</div>
            <div style={{ display:"flex", alignItems:"center", gap:8, fontWeight:700, fontSize:18 }}>{user.emoji} {user.name}</div>
            <button onClick={()=>setUser(null)} style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"#fff", padding:"8px 16px", borderRadius:20, cursor:"pointer", fontWeight:600 }}>Cambiar</button>
          </div>
          <div style={{ background:"#fff", display:"flex", borderBottom:"1px solid #eee" }}>
            {[{id:"gastos",label:"📋 Gastos"},{id:"agregar",label:"➕ Agregar"},{id:"balance",label:"⚖️ Balance"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{ flex:1, padding:"14px 8px", border:"none", background:"none", cursor:"pointer", fontWeight:tab===t.id?700:400, color:tab===t.id?"#5C6BC0":"#999", borderBottom:tab===t.id?"2px solid #5C6BC0":"2px solid transparent", fontSize:14 }}>{t.label}</button>
            ))}
          </div>
          {tab==="gastos" && <GastosView expenses={expenses} onDelete={delExpense} />}
          {tab==="agregar" && <AgregarView user={user} onAdd={addExpense} />}
          {tab==="balance" && <BalanceView expenses={expenses} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
